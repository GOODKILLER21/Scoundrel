workflows:
  ios-capacitor-build:
    name: Scoundrel iOS Build

    environment:
      node: latest
      xcode: latest

    scripts:
      - npm install

      # ensure ios platform exists
      - npx cap add ios || true

      # sync web into ios + generate required files (INCLUDING Podfile)
      - npx cap sync ios

      # build using Capacitor (NOT manual pod/xcode commands)
      - npx cap build ios

    artifacts:
      - ios/**/*.ipa